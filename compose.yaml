version: '3.8'

services:
  app:
    build: .
    container_name: bookfair-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/bookfairdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234

  db:
    image: postgres:15
    container_name: bookfair-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: bookfairdb
    ports:
      - "5432:5432"
    volumes:
      - bookfair_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bookfairdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bookfair_postgres_data: